jobs: 50
restart-times: 1
latency-wait: 60
printshellcmds: true
keep-going: true
cluster: "sbatch --partition={resources.partition} --cpus-per-task={threads} --mem={resources.mem_mb} --time={resources.runtime} --job-name=smk-{rule} --output=logs/slurm/{rule}-%j.out"
default-resources:
  - partition=normal
  - mem_mb=4000
  - runtime=01:00:00
  - tmpdir=/tmp
jobscript: profiles/slurm/jobscript.sh
max-jobs-per-second: 5
max-status-checks-per-second: 5
